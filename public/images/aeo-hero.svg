<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Gradients -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DC4632" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#DC4632" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#C8A951" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DC4632" stop-opacity="0"/>
      <stop offset="50%" stop-color="#DC4632" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#DC4632" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGradGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8A951" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C8A951" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C8A951" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC4632"/>
      <stop offset="100%" stop-color="#C8A951"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <linearGradient id="accentTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DC4632"/>
      <stop offset="100%" stop-color="#C8A951"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0F"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#C8A951" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#centerGlow)"/>
  <rect width="1200" height="630" fill="url(#goldGlow)"/>

  <!-- Neural network connections (behind nodes) -->
  <g opacity="0.25" stroke-width="1">
    <!-- Central hub connections -->
    <line x1="600" y1="280" x2="420" y2="180" stroke="url(#lineGrad)"/>
    <line x1="600" y1="280" x2="780" y2="180" stroke="url(#lineGrad)"/>
    <line x1="600" y1="280" x2="350" y2="350" stroke="url(#lineGradGold)"/>
    <line x1="600" y1="280" x2="850" y2="350" stroke="url(#lineGradGold)"/>
    <line x1="600" y1="280" x2="480" y2="420" stroke="url(#lineGrad)"/>
    <line x1="600" y1="280" x2="720" y2="420" stroke="url(#lineGrad)"/>
    <line x1="600" y1="280" x2="600" y2="140" stroke="url(#lineGradGold)"/>
    <line x1="600" y1="280" x2="600" y2="450" stroke="url(#lineGradGold)"/>
    <!-- Outer connections -->
    <line x1="420" y1="180" x2="280" y2="130" stroke="url(#lineGrad)"/>
    <line x1="420" y1="180" x2="350" y2="350" stroke="url(#lineGradGold)"/>
    <line x1="780" y1="180" x2="920" y2="130" stroke="url(#lineGrad)"/>
    <line x1="780" y1="180" x2="850" y2="350" stroke="url(#lineGradGold)"/>
    <line x1="350" y1="350" x2="200" y2="400" stroke="url(#lineGrad)"/>
    <line x1="850" y1="350" x2="1000" y2="400" stroke="url(#lineGrad)"/>
    <line x1="480" y1="420" x2="350" y2="500" stroke="url(#lineGradGold)"/>
    <line x1="720" y1="420" x2="850" y2="500" stroke="url(#lineGradGold)"/>
    <line x1="280" y1="130" x2="160" y2="200" stroke="url(#lineGrad)"/>
    <line x1="920" y1="130" x2="1040" y2="200" stroke="url(#lineGrad)"/>
    <line x1="200" y1="400" x2="120" y2="320" stroke="url(#lineGradGold)"/>
    <line x1="1000" y1="400" x2="1080" y2="320" stroke="url(#lineGradGold)"/>
  </g>

  <!-- Neural network nodes -->
  <!-- Central large node -->
  <circle cx="600" cy="280" r="18" fill="url(#nodeGrad)" filter="url(#bigGlow)" opacity="0.9"/>
  <circle cx="600" cy="280" r="10" fill="#0A0A0F"/>
  <circle cx="600" cy="280" r="6" fill="url(#nodeGrad)" opacity="0.8"/>

  <!-- Primary ring nodes -->
  <circle cx="420" cy="180" r="8" fill="#DC4632" filter="url(#softGlow)" opacity="0.7"/>
  <circle cx="780" cy="180" r="8" fill="#DC4632" filter="url(#softGlow)" opacity="0.7"/>
  <circle cx="350" cy="350" r="7" fill="#C8A951" filter="url(#softGlow)" opacity="0.6"/>
  <circle cx="850" cy="350" r="7" fill="#C8A951" filter="url(#softGlow)" opacity="0.6"/>
  <circle cx="480" cy="420" r="7" fill="#DC4632" filter="url(#softGlow)" opacity="0.6"/>
  <circle cx="720" cy="420" r="7" fill="#DC4632" filter="url(#softGlow)" opacity="0.6"/>
  <circle cx="600" cy="140" r="6" fill="#C8A951" filter="url(#softGlow)" opacity="0.5"/>
  <circle cx="600" cy="450" r="6" fill="#C8A951" filter="url(#softGlow)" opacity="0.5"/>

  <!-- Secondary ring nodes -->
  <circle cx="280" cy="130" r="5" fill="#DC4632" filter="url(#glow)" opacity="0.5"/>
  <circle cx="920" cy="130" r="5" fill="#DC4632" filter="url(#glow)" opacity="0.5"/>
  <circle cx="200" cy="400" r="4" fill="#C8A951" filter="url(#glow)" opacity="0.4"/>
  <circle cx="1000" cy="400" r="4" fill="#C8A951" filter="url(#glow)" opacity="0.4"/>
  <circle cx="350" cy="500" r="4" fill="#DC4632" filter="url(#glow)" opacity="0.4"/>
  <circle cx="850" cy="500" r="4" fill="#DC4632" filter="url(#glow)" opacity="0.4"/>

  <!-- Tertiary distant nodes -->
  <circle cx="160" cy="200" r="3" fill="#DC4632" filter="url(#glow)" opacity="0.3"/>
  <circle cx="1040" cy="200" r="3" fill="#DC4632" filter="url(#glow)" opacity="0.3"/>
  <circle cx="120" cy="320" r="3" fill="#C8A951" filter="url(#glow)" opacity="0.3"/>
  <circle cx="1080" cy="320" r="3" fill="#C8A951" filter="url(#glow)" opacity="0.3"/>
  <circle cx="100" cy="480" r="2" fill="#DC4632" opacity="0.2"/>
  <circle cx="1100" cy="480" r="2" fill="#DC4632" opacity="0.2"/>
  <circle cx="500" cy="80" r="2" fill="#C8A951" opacity="0.2"/>
  <circle cx="700" cy="80" r="2" fill="#C8A951" opacity="0.2"/>
  <circle cx="180" cy="540" r="2" fill="#C8A951" opacity="0.15"/>
  <circle cx="1020" cy="540" r="2" fill="#C8A951" opacity="0.15"/>

  <!-- Floating data particles -->
  <circle cx="300" cy="250" r="1.5" fill="#DC4632" opacity="0.4"/>
  <circle cx="900" cy="250" r="1.5" fill="#DC4632" opacity="0.4"/>
  <circle cx="450" cy="100" r="1" fill="#C8A951" opacity="0.3"/>
  <circle cx="750" cy="100" r="1" fill="#C8A951" opacity="0.3"/>
  <circle cx="520" cy="520" r="1.5" fill="#DC4632" opacity="0.35"/>
  <circle cx="680" cy="520" r="1.5" fill="#DC4632" opacity="0.35"/>
  <circle cx="150" cy="150" r="1" fill="#C8A951" opacity="0.2"/>
  <circle cx="1050" cy="150" r="1" fill="#C8A951" opacity="0.2"/>

  <!-- Search/magnifying glass icon integrated into central node -->
  <g transform="translate(600, 280)" opacity="0.9">
    <circle cx="-2" cy="-2" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.9"/>
    <line x1="1" y1="1" x2="4" y2="4" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Decorative horizontal lines -->
  <line x1="80" y1="560" x2="380" y2="560" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="820" y1="560" x2="1120" y2="560" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="70" x2="280" y2="70" stroke="url(#lineGradGold)" stroke-width="1" opacity="0.2"/>
  <line x1="920" y1="70" x2="1120" y2="70" stroke="url(#lineGradGold)" stroke-width="1" opacity="0.2"/>

  <!-- "AEO" large text — slightly transparent, positioned behind the network -->
  <text x="600" y="310" text-anchor="middle" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="160" font-weight="800" letter-spacing="16" fill="url(#accentTextGrad)" opacity="0.06">AEO</text>

  <!-- Tagline label -->
  <text x="600" y="540" text-anchor="middle" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="6" fill="#C8A951" opacity="0.6" text-transform="uppercase">ANSWER ENGINE OPTIMIZATION</text>

  <!-- Subtitle -->
  <text x="600" y="570" text-anchor="middle" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="3" fill="#FFFFFF" opacity="0.3">THE COMPLETE GUIDE FOR 2026</text>

  <!-- Corner accents -->
  <path d="M 40 40 L 40 80" stroke="#DC4632" stroke-width="1.5" opacity="0.4"/>
  <path d="M 40 40 L 80 40" stroke="#DC4632" stroke-width="1.5" opacity="0.4"/>
  <path d="M 1160 40 L 1160 80" stroke="#DC4632" stroke-width="1.5" opacity="0.4"/>
  <path d="M 1160 40 L 1120 40" stroke="#DC4632" stroke-width="1.5" opacity="0.4"/>
  <path d="M 40 590 L 40 550" stroke="#C8A951" stroke-width="1.5" opacity="0.3"/>
  <path d="M 40 590 L 80 590" stroke="#C8A951" stroke-width="1.5" opacity="0.3"/>
  <path d="M 1160 590 L 1160 550" stroke="#C8A951" stroke-width="1.5" opacity="0.3"/>
  <path d="M 1160 590 L 1120 590" stroke="#C8A951" stroke-width="1.5" opacity="0.3"/>
</svg>